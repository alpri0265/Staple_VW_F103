[platformio]
default_envs = bluepill_f103c8
src_dir = Core/Src
include_dir = Core/Inc

[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube

build_flags =
  -DUSE_HAL_DRIVER
  -DSTM32F103xB

build_src_filter =
  +<*>
  -<system_stm32f1xx.c>
  -<syscalls.c>
  -<sysmem.c>

upload_protocol = stlink
debug_tool = stlink
